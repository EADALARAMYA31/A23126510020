<!DOCTYPE html>
<html>
<head>
    <title>Notification System</title>
</head>
<body>

<h2>Notifications</h2>

<button onclick="addNotification()">Add Test Notification</button>
<button onclick="loadNotifications()">Load Notifications</button>

<ul id="list"></ul>

<script>
const API = "http://localhost:3000/notifications";

// ADD
async function addNotification() {
    await fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Frontend Test Notification",
            type: "Event"
        })
    });

    loadNotifications();
}

// LOAD
async function loadNotifications() {
    const res = await fetch(API);
    const data = await res.json();

    console.log(data); // IMPORTANT DEBUG

    document.getElementById("list").innerHTML =
        data.map(n =>
            `<li><b>${n.message}</b> - ${n.type}</li>`
        ).join("");
}
</script>

</body>
</html>
