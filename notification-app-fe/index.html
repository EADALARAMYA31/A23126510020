<!DOCTYPE html>
<html>
<head>
    <title>Notification System</title>
</head>
<body>

<h2>Notifications</h2>

<button onclick="addNotification()">Add Test Notification</button>
<button onclick="loadNotifications()">Load Notifications</button>

<ul id="list"></ul>

<script>
const API = "http://localhost:3000/notifications";

// ADD
async function addNotification() {
    await fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Frontend Test Notification",
            type: "Event"
        })
    });

    loadNotifications();
}

// LOAD
async function loadNotifications() {
    try {
        const res = await fetch("http://localhost:3000/notifications");
        const data = await res.json();

        console.log("DEBUG DATA:", data);

        const list = document.getElementById("list");

        list.innerHTML = "";

        data.forEach(n => {
            const li = document.createElement("li");
            li.innerText = `${n.message} - ${n.type}`;
            list.appendChild(li);
        });

    } catch (error) {
        console.log("ERROR:", error);
        alert("Failed to load notifications");
    }
}
</script>

</body>
</html>
